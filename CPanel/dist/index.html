    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #3d1c02; font-family: system-ui, sans-serif; }

      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: linear-gradient(135deg, #3d1c02 0%, #6b3a2a 50%, #c8973a 100%);
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.5s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }

      .splash-logo {
        font-size: 72px; margin-bottom: 16px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      .splash-name {
        font-size: 36px; font-weight: 800; color: #f5e6c8;
        letter-spacing: -1px; margin-bottom: 8px;
      }
      .splash-tagline {
        font-size: 15px; color: #d9a84e; margin-bottom: 48px;
      }
      .splash-loader {
        width: 48px; height: 4px; background: rgba(255,255,255,0.2);
        border-radius: 2px; overflow: hidden;
      }
      .splash-loader-bar {
        height: 100%; background: #c8973a; border-radius: 2px;
        animation: loading 2s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.1); }
      }
      @keyframes loading {
        0% { width: 0%; }
        50% { width: 70%; }
        100% { width: 100%; }
      }

      #root { min-height: 100vh; background: #fdf6ed; }

    <script>
      // Hide splash after app loads (max 3 sec)
      window.__hideSplash = function() {
        const splash = document.getElementById('splash')

      }
      setTimeout(window.__hideSplash, 3000)
